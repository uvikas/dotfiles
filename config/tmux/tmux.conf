# tmux — Cyberpunk / Catppuccin Mocha
# Symlinked by setup-ubuntu.sh to ~/.config/tmux/tmux.conf

# ============================================================
# General
# ============================================================

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-kitty:RGB"

# Start windows/panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows on close
set -g renumber-windows on

# Scrollback
set -g history-limit 50000

# Mouse
set -g mouse on

# Faster escape (for vim)
set -sg escape-time 10

# Focus events (for vim autoread)
set -g focus-events on

# ============================================================
# Key bindings
# ============================================================

# vi mode for copy
setw -g mode-keys vi

# Splits in current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# vi copy mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ============================================================
# Status bar — Catppuccin Mocha
# ============================================================

set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-position bottom
set -g status-justify left

# Left: session name
set -g status-left-length 30
set -g status-left "#[bg=#cba6f7,fg=#1e1e2e,bold]  #S #[bg=#1e1e2e,fg=#cba6f7]"

# Right: date and time
set -g status-right-length 50
set -g status-right "#[fg=#45475a]#[bg=#45475a,fg=#cdd6f4]  %Y-%m-%d #[bg=#cba6f7,fg=#1e1e2e,bold]  %H:%M "

# Window tabs
setw -g window-status-format "#[fg=#45475a,bg=#1e1e2e]#[bg=#45475a,fg=#cdd6f4] #I:#W #[fg=#45475a,bg=#1e1e2e]"
setw -g window-status-current-format "#[fg=#f38ba8,bg=#1e1e2e]#[bg=#f38ba8,fg=#1e1e2e,bold] #I:#W #[fg=#f38ba8,bg=#1e1e2e]"

# Pane borders
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#cba6f7"

# Messages
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#cdd6f4"

# Clock
setw -g clock-mode-colour "#cba6f7"
